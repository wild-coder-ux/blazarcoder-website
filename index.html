<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlazarCoder</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0B0F1A, #111827);
    color: white;
}

.hero {
    height: 60vh;
    background: url('header_4096x2304.jpg') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.hero h1 {
    font-size: 3rem;
    margin: 0;
}

.hero p {
    color: #00D4FF;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 25px;
    margin: 20px 0;
}

.apps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.app {
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid #00D4FF33;
}
</style>
</head>

<body>

<!-- ✅ HERO (THIS WAS MISSING) -->
<section class="hero">
    <h1>BlazarCoder</h1>
    <p>Build. Automate. Innovate.</p>
</section>

<div class="container">

    <div class="card">
        <h2>About</h2>
        <p>
            BlazarCoder builds smart AI-powered mobile apps and tools.
        </p>
    </div>

    <!-- ✅ APPS (EMPTY CONTAINER) -->
    <div class="card">
        <h2>Apps</h2>
        <div class="apps" id="appsContainer"></div>
    </div>

    <div class="card">
        <h2>Contact</h2>
        <p>Email: <a href="mailto:admin@blazarcoder.com">admin@blazarcoder.com</a></p>
    </div>

    <div class="card">
        <h2>Legal</h2>
        <p><a href="privacy.html">Privacy Policy</a></p>
    </div>

</div>

<footer style="text-align:center; padding:20px; color:#888;">
    © 2026 BlazarCoder
</footer>

<!-- ✅ SCRIPT GOES HERE (VERY IMPORTANT) -->

    { name: "Game 7", desc: "Offline fun." },
    { name: "Game 8", desc: "Simple gameplay." },
    { name: "Game 9", desc: "Quick play." },
    { name: "Game 10", desc: "Casual entertainment." },

    { name: "Game 11", desc: "Strategy gameplay." },
    { name: "Game 12", desc: "Brain puzzles." },
    { name: "Game 13", desc: "Relaxing game." },

    container.appendChild(div);
});
</script>

</body>
</html>
