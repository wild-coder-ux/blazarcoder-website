<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlazarCoder</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0B0F1A, #111827);
    color: white;
}
.app-card {
    cursor: pointer;
    padding: 15px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #00D4FF33;
    transition: all 0.3s;
}

.app-card:hover {
    transform: scale(1.02);
}

.app-details {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
    margin-top: 10px;
    color: #cbd5e1;
}

.app-card.active .app-details {
    max-height: 200px;
}
.hero {
    height: 50vh;
    background: 
        linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)),
        url('header_4096x2304.png') center/cover no-repeat;
}

.hero h1 {
    font-size: 3rem;
    margin: 0;
}

.hero p {
    color: #00D4FF;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 25px;
    margin: 20px 0;
}

.apps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.app {
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid #00D4FF33;
}

.container {
    max-width: 900px;
    margin: 40px auto; /* THIS FIXES OVERLAP */
    padding: 20px;
}    
</style>
</head>

<body>
<!-- ✅ HERO (THIS WAS MISSING) -->
<section class="hero"></section>    


<div class="container">

    <div class="card">
        <h2>About</h2>
        <p>
            BlazarCoder builds smart AI-powered mobile apps and tools.
        </p>
    </div>

    <!-- ✅ APPS (EMPTY CONTAINER) -->
    <div class="card">
        <h2>Apps</h2>
        <div class="apps" id="appsContainer"></div>
    </div>

    <div class="card">
        <h2>Contact</h2>
        <p>Email: <a href="mailto:admin@blazarcoder.com">admin@blazarcoder.com</a></p>
    </div>

    <div class="card">
        <h2>Legal</h2>
        <p><a href="privacy.html">Privacy Policy</a></p>
    </div>

</div>

<footer style="text-align:center; padding:20px; color:#888;">
    © 2026 BlazarCoder
</footer>

<!-- ✅ SCRIPT GOES HERE (VERY IMPORTANT) -->
<script>
const apps = [
    {
        name: "GeoSpeech",
        category: "Education",
        status: "In Review",
        icon: "geospeech-icon.png",
        desc: "Speak places — see the world instantly.",
        details: "Voice-powered geography app. Speak places, see them on map, get distances and facts. Works worldwide. No login, no tracking."
    },
    {
        name: "Offline Games Pack",
        category: "Games",
        status: "Live",
        icon: "ic_launcher-playstore.png",
        desc: "27 fun offline games in one app.",
        details: "Includes puzzle, arcade, and casual games designed for quick and fun gameplay without internet."
    }
];

const container = document.getElementById("appsContainer");

apps.forEach(app => {
    const div = document.createElement("div");
    div.className = "app-card";

    div.innerHTML = `
        <div style="display:flex; align-items:center; gap:15px;">
            
            <!-- ICON -->
            <div style="
                width:60px;
                height:60px;
                border-radius:15px;
                background:${app.icon ? `url(${app.icon}) center/cover` : '#00D4FF22'};
                border:1px solid #00D4FF33;
            "></div>

            <!-- TEXT -->
            <div style="flex:1;">
                <strong style="font-size:18px;">${app.name}</strong>
                <div style="font-size:13px; color:#94a3b8;">
                    ${app.category}
                </div>

                <!-- STATUS -->
                <div style="margin-top:5px;">
                    <span style="
                        font-size:12px;
                        padding:4px 8px;
                        border-radius:6px;
                        background:${getStatusColor(app.status)};
                        color:white;
                    ">
                        ${app.status}
                    </span>
                </div>

                <p style="margin:6px 0 0; font-size:14px;">
                    ${app.desc}
                </p>
            </div>
        </div>

        <div class="app-details" style="margin-top:10px;">
            ${app.details}

            <div style="margin-top:10px;">
                <button style="
                    padding:8px 14px;
                    border:none;
                    border-radius:8px;
                    background:#00D4FF;
                    color:black;
                    cursor:pointer;
                    opacity:0.6;
                ">
                    Install (Coming Soon)
                </button>
            </div>
        </div>
    `;

    div.addEventListener("click", () => {
        div.classList.toggle("active");
    });

    container.appendChild(div);
});

function getStatusColor(status) {
    if (status === "Live") return "#22c55e";
    if (status === "In Review") return "#f59e0b";
    return "#64748b";
}
</script>
</body>
</html>
